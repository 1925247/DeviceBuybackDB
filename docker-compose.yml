version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/gadgetswap
      - SESSION_SECRET=${SESSION_SECRET:-default_session_secret_change_me}
    restart: unless-stopped
    networks:
      - gadgetswap-network

  db:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=gadgetswap
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - gadgetswap-network

networks:
  gadgetswap-network:
    driver: bridge

volumes:
  postgres-data: