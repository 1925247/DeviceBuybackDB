version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: buyback_postgres
    environment:
      POSTGRES_DB: buyback_platform
      POSTGRES_USER: buyback_user
      POSTGRES_PASSWORD: buyback_pass
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database-backup.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - buyback_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buyback_user -d buyback_platform"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis (for session management and caching)
  redis:
    image: redis:7-alpine
    container_name: buyback_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - buyback_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Application Server
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: buyback_app
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://buyback_user:buyback_pass@postgres:5432/buyback_platform
      REDIS_URL: redis://redis:6379
      PORT: 5000
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: buyback_platform
      PGUSER: buyback_user
      PGPASSWORD: buyback_pass
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - buyback_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - ./public:/app/public
      - ./uploads:/app/uploads

  # Nginx Reverse Proxy (optional, for production)
  nginx:
    image: nginx:alpine
    container_name: buyback_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - buyback_network
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  buyback_network:
    driver: bridge